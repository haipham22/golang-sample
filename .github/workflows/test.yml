name: Test Govern Library

on:
  push:
    branches: [main]
    paths:
      - "config/**"
      - "cron/**"
      - "database/**"
      - "errors/**"
      - "graceful/**"
      - "healthcheck/**"
      - "http/**"
      - "log/**"
      - "metrics/**"
      - "mq/**"
      - "retry/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]
    paths:
      - "config/**"
      - "cron/**"
      - "database/**"
      - "errors/**"
      - "graceful/**"
      - "healthcheck/**"
      - "http/**"
      - "log/**"
      - "metrics/**"
      - "mq/**"
      - "retry/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/test.yml"

concurrency:
  group: test-govern-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Run tests
        run: |
          go test -v -race -coverprofile=coverage.out \
            ./config/... ./cron/... ./database/... ./errors/... ./graceful/... \
            ./healthcheck/... ./http/... ./log/... ./metrics/... ./mq/... ./retry/...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          flags: govern-library
          fail_ci_if_error: false
