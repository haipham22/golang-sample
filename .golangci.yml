version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosec
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gosec:
      includes:
        - G101 # Look for hard coded credentials
        - G102 # Bind to all interfaces
        - G103 # Audit the use of unsafe block
        - G104 # Audit errors not checked
        - G107 # Url provided to HTTP request as taint input
        - G108 # Profiling endpoint exposed on /debug/pprof
        - G109 # Convert String to Int with strconv.Atoi
        - G110 # Potential DoS via decompression bomb
        - G111 # Potential directory traversal
        - G201 # SQL query construction using format string
        - G202 # SQL query construction using string concatenation
        - G203 # Use of unescaped data in HTML templates
        - G204 # Audit use of command execution
        - G301 # Poor file permissions when creating a directory
        - G302 # Poor file permissions with chmod
        - G303 # Creating tempfile using a predictable path
        - G304 # File path provided as taint input
        - G306 # Poor file permissions when writing to a new file
        - G307 # Deferring a method which returns an error
        - G401 # Detect usage of DES, RC4, MD5 or SHA1
        - G402 # Look for bad TLS connection settings
        - G403 # Ensure minimum RSA key length of 2048 bits
        - G404 # Insecure random number source (rand)
        - G405 # Minimize the use of exec.Command
        - G501 # Import blocklist: crypto/md5, crypto/sha1
        - G502 # Import blocklist: crypto/des, crypto/rc4
        - G503 # Import blocklist: crypto/md5, crypto/sha1
        - G504 # Import blocklist: net/http/cgi
        - G601 # Implicit memory aliasing in range statement

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/haipham22/govern
        - github.com/haipham22/golang-sample

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - vendor
    - testdata
    - generated
  exclude-files:
    - ".*\\.gen\\.go$"
  exclude-rules:
    # Relax some linters on test files.
    - path: _test\.go
      linters:
        - gosec
        - errcheck
